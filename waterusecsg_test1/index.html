<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Journey — Sea La Vie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.32/"></script>

  <style>
    :root {
      --bg: #060A10;
      --surface: rgba(6, 10, 18, 0.9);
      --surface-mid: rgba(10, 16, 28, 0.82);
      --gold: #C8943A;
      --gold-light: #E5B96A;
      --gold-dim: rgba(200, 148, 58, 0.15);
      --gold-border: rgba(200, 148, 58, 0.22);
      --gold-border-strong: rgba(200, 148, 58, 0.48);
      --cream: #F0E8D5;
      --text: #EAE0CC;
      --muted: #8A7D6A;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.4);
      --boat-size: min(16vw, 130px);
      --safe-top: max(10px, env(safe-area-inset-top));
      --safe-right: max(10px, env(safe-area-inset-right));
      --safe-bottom: max(10px, env(safe-area-inset-bottom));
      --safe-left: max(10px, env(safe-area-inset-left));
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body, #app {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    body { position: fixed; inset: 0; }
    #app { position: relative; touch-action: none; user-select: none; }

    /* ─── MAP ─────────────────────────────────────────── */
    #viewDiv {
      position: absolute; inset: 0;
      background: #08111E;
    }

    #viewDiv .esri-view-root,
    #viewDiv .esri-view-surface,
    #viewDiv canvas {
      filter: saturate(0.78) brightness(0.72) contrast(1.08) hue-rotate(8deg);
    }

    /* Gold grain/noise overlay */
    #viewDiv::after {
      content: "";
      position: absolute; inset: 0;
      pointer-events: none; z-index: 2;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(200,148,58,0.012) 2px, rgba(200,148,58,0.012) 3px),
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(200,148,58,0.008) 2px, rgba(200,148,58,0.008) 3px);
    }

    /* ─── VIGNETTE ───────────────────────────────────── */
    .vignette {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 4;
      background: radial-gradient(ellipse at 50% 48%, transparent 28%, rgba(6,10,18,0.55) 72%, rgba(6,10,18,0.82) 100%);
    }

    /* ─── CROSSHAIR ──────────────────────────────────── */
    .crosshair {
      position: absolute; left: 50%; top: 50%;
      width: 110px; height: 110px;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 8;
    }
    .crosshair::before, .crosshair::after {
      content: ""; position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(200,148,58,0.18);
    }
    .crosshair::before { inset: 0; }
    .crosshair::after { inset: 20px; border-color: rgba(200,148,58,0.1); }

    /* ─── BOAT ───────────────────────────────────────── */
    .boat-wrap {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -52%);
      width: var(--boat-size);
      height: calc(var(--boat-size) * 0.58);
      z-index: 12; pointer-events: none;
      filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.55)) drop-shadow(0 2px 6px rgba(200,148,58,0.12));
    }
    .boat-wrap svg { width: 100%; height: 100%; overflow: visible; }

    .wake-1 { animation: wakeA 2.8s ease-in-out infinite; transform-origin: 50% 52%; }
    .wake-2 { animation: wakeA 2.8s ease-in-out infinite 0.5s; transform-origin: 50% 52%; }

    @keyframes wakeA {
      0%, 100% { opacity: 0.28; transform: scaleX(0.96); }
      50% { opacity: 0.62; transform: scaleX(1.07); }
    }

    /* ─── TOP STRIP ──────────────────────────────────── */
    .top-strip {
      position: absolute;
      top: var(--safe-top); left: var(--safe-left); right: var(--safe-right);
      z-index: 20;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 8px 13px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 12px;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow-sm);
    }

    .top-brand {
      display: flex; align-items: baseline; gap: 8px;
      min-width: 0;
    }
    .brand-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 14px; font-weight: 600; letter-spacing: 0.12em;
      color: var(--gold-light);
      white-space: nowrap;
    }
    .brand-sep {
      width: 1px; height: 12px; background: var(--gold-border);
      flex-shrink: 0; align-self: center;
    }
    .brand-sub {
      font-family: 'Nunito', sans-serif;
      font-size: 10px; font-weight: 400; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .top-status {
      font-family: 'Nunito', sans-serif;
      font-size: 10px; font-weight: 300; letter-spacing: 0.06em;
      color: var(--muted); text-align: right;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }

    /* ─── MEDIA CARD ─────────────────────────────────── */
    .media-card {
      position: absolute;
      left: var(--safe-left);
      top: calc(var(--safe-top) + 44px);
      width: min(268px, calc(100vw - 22px));
      z-index: 20;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      display: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .media-card.show {
      display: block;
      animation: slideIn 0.28s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .media-close {
      position: absolute; right: 9px; top: 9px;
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid var(--gold-border);
      background: var(--surface);
      color: var(--muted); font: 16px/1 'Nunito', sans-serif;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 3;
      transition: border-color 0.2s, color 0.2s;
    }
    .media-close:hover { border-color: var(--gold-border-strong); color: var(--gold-light); }

    .media-frame {
      aspect-ratio: 16 / 9;
      width: 100%; max-height: 116px;
      position: relative; overflow: hidden;
      background: rgba(200,148,58,0.06);
    }
    .media-frame img, .media-frame video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .media-badge {
      position: absolute; left: 10px; top: 10px;
      background: rgba(6,10,18,0.75);
      border: 1px solid var(--gold-border);
      color: var(--gold-light);
      border-radius: 100px; padding: 4px 9px;
      font-family: 'Nunito', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; z-index: 2;
    }
    /* Gold line at top of card */
    .media-card::before {
      content: ""; display: block;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
      opacity: 0.7;
    }

    .media-body { padding: 10px 12px 12px; }

    .stop-eyebrow {
      font-family: 'Nunito', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 4px;
    }
    .media-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 17px; font-weight: 600; line-height: 1.15;
      color: var(--cream); margin: 0 0 5px;
    }
    .media-text {
      font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 300; line-height: 1.5;
      color: var(--muted);
      margin: 0;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .media-chips {
      margin-top: 8px; display: flex; gap: 5px; flex-wrap: wrap;
    }
    .chip {
      font-family: 'Nunito', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px; border-radius: 100px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
    }

    /* ─── MEDIA PEEK ─────────────────────────────────── */
    .media-peek {
      position: absolute;
      left: var(--safe-left);
      top: calc(var(--safe-top) + 44px);
      z-index: 20;
      display: none; align-items: center; gap: 8px;
      padding: 7px 11px; border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      backdrop-filter: blur(12px);
      cursor: pointer;
      max-width: min(200px, calc(100vw - 22px));
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s;
    }
    .media-peek.show { display: inline-flex; }
    .media-peek:hover { border-color: var(--gold-border-strong); }
    .peek-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); flex: 0 0 auto;
    }
    .peek-label {
      font-family: 'Nunito', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      color: var(--gold-light);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ─── ROUTE CARD ─────────────────────────────────── */
    .route-card {
      position: absolute;
      left: var(--safe-left); right: var(--safe-right); bottom: var(--safe-bottom);
      z-index: 20;
      padding: 12px 13px 13px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 14px;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }
    .route-card::before {
      content: ""; display: block;
      height: 2px; margin: -12px -13px 10px;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
      opacity: 0.55;
    }

    .route-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
      margin-bottom: 8px;
    }
    .route-label {
      font-family: 'Nunito', sans-serif;
      font-size: 10px; font-weight: 300; color: var(--muted); line-height: 1.3;
    }
    .route-label strong {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--cream);
    }
    .current-stop {
      text-align: right; max-width: 48%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .stop-progress-label {
      font-family: 'Nunito', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 1px;
    }

    /* ─── SLIDER ─────────────────────────────────────── */
    .progress-wrap { position: relative; }

    .stop-ticks {
      position: absolute;
      inset: 0px 12px auto 12px;
      height: 20px;
      pointer-events: none;
    }
    .stop-tick {
      position: absolute; top: 3px;
      width: 1.5px; height: 12px;
      background: rgba(200,148,58,0.4);
      transform: translateX(-50%);
    }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 36px; background: transparent; margin: 0;
      touch-action: pan-x;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px; border-radius: 100px;
      background: linear-gradient(90deg, rgba(200,148,58,0.55) 0%, rgba(229,185,106,0.85) 100%);
      border: 1px solid rgba(200,148,58,0.25);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px; margin-top: -9px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, var(--gold-light), var(--gold));
      border: 2px solid rgba(200,148,58,0.8);
      box-shadow: 0 4px 16px rgba(200,148,58,0.3), 0 2px 6px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-track {
      height: 6px; border-radius: 100px;
      background: linear-gradient(90deg, rgba(200,148,58,0.55), rgba(229,185,106,0.85));
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, var(--gold-light), var(--gold));
      border: 2px solid rgba(200,148,58,0.8);
      cursor: pointer;
    }

    .stop-name-row {
      display: flex; justify-content: space-between; gap: 8px;
      margin-top: 4px;
    }
    .stop-name-row span {
      font-family: 'Nunito', sans-serif;
      font-size: 9px; font-weight: 400; letter-spacing: 0.08em;
      color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .stop-name-row span:nth-child(2) {
      text-align: center; flex: 1; color: rgba(200,148,58,0.5);
    }

    /* ─── HINT STRIP ─────────────────────────────────── */
    .hint-strip {
      position: absolute; left: 50%; bottom: calc(var(--safe-bottom) + 116px);
      transform: translateX(-50%);
      z-index: 18; pointer-events: none;
      display: flex; align-items: center; gap: 7px;
      padding: 5px 13px; border-radius: 100px;
      background: rgba(6,10,18,0.65);
      border: 1px solid var(--gold-border);
      backdrop-filter: blur(8px);
      font-family: 'Nunito', sans-serif;
      font-size: 9px; font-weight: 400; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
      opacity: 1; transition: opacity 1s ease;
    }
    .hint-strip.hidden { opacity: 0; }
    .hint-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); opacity: 0.6; }

    /* ─── LOADING ─────────────────────────────────────── */
    .loading-card {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 40;
      padding: 18px 22px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 14px; text-align: center;
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      min-width: 220px; max-width: calc(100vw - 40px);
    }
    .loading-card p {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px; font-weight: 400; font-style: italic;
      color: var(--cream); margin: 0 0 4px;
    }
    .loading-card small {
      font-family: 'Nunito', sans-serif;
      font-size: 10px; color: var(--muted); letter-spacing: 0.1em;
    }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 700px) {
      :root { --boat-size: min(26vw, 108px); }
      .crosshair { width: 88px; height: 88px; }
      .brand-name { font-size: 12px; }
      .media-card { width: min(238px, calc(100vw - 20px)); left: 10px; }
      .media-peek { left: 10px; }
      .media-title { font-size: 15px; }
    }
    @media (max-width: 480px) {
      :root { --boat-size: min(30vw, 100px); }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="viewDiv"></div>
  <div class="vignette"></div>
  <div class="crosshair"></div>

  <!-- ── BOAT SVG ── -->
  <div class="boat-wrap" aria-hidden="true">
    <svg viewBox="0 0 300 174" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hullG" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#1C2C3E"/>
          <stop offset="60%" stop-color="#243347"/>
          <stop offset="100%" stop-color="#1A2838"/>
        </linearGradient>
        <linearGradient id="deckG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2A3F52"/>
          <stop offset="100%" stop-color="#1A2C3D"/>
        </linearGradient>
        <linearGradient id="accentG" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#A07028"/>
          <stop offset="50%" stop-color="#E5B96A"/>
          <stop offset="100%" stop-color="#A07028"/>
        </linearGradient>
      </defs>

      <!-- Wake -->
      <ellipse class="wake-1" cx="148" cy="90" rx="148" ry="38" fill="rgba(180,210,255,0.07)"/>
      <ellipse class="wake-2" cx="148" cy="90" rx="112" ry="26" fill="rgba(180,210,255,0.08)"/>

      <!-- Bow foam lines -->
      <path d="M26 60 Q0 63 -18 80" stroke="rgba(200,225,255,0.45)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M30 67 Q8 76 -5 92" stroke="rgba(200,225,255,0.28)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

      <!-- Hull shadow -->
      <path d="M24 56 L264 40 L292 62 L165 82 L40 82 Z" fill="rgba(0,0,0,0.28)" transform="translate(3,7)"/>
      <!-- Hull main -->
      <path d="M24 52 L264 36 L292 58 L165 78 L40 78 Z" fill="url(#hullG)" stroke="rgba(200,148,58,0.45)" stroke-width="1.5"/>
      <!-- Gold waterline stripe -->
      <path d="M28 68 L270 52 L288 58 L165 76 L43 75 Z" fill="url(#accentG)" opacity="0.18"/>

      <!-- Deck / cabin -->
      <path d="M86 24 L196 12 L222 30 L222 44 L88 50 Z" fill="url(#deckG)" stroke="rgba(200,148,58,0.35)" stroke-width="1.2"/>
      <!-- Windscreen -->
      <path d="M165 14 L190 22 L190 34 L165 36 Z" fill="rgba(120,190,230,0.18)" stroke="rgba(200,148,58,0.3)" stroke-width="0.8"/>
      <!-- Antenna -->
      <line x1="200" y1="14" x2="204" y2="2" stroke="rgba(200,148,58,0.5)" stroke-width="1.2"/>
      <!-- Cleats -->
      <circle cx="54" cy="65" r="3" fill="rgba(200,148,58,0.55)"/>
      <circle cx="172" cy="58" r="3" fill="rgba(200,148,58,0.55)"/>
      <!-- Deck detail line -->
      <path d="M90 38 L190 28" stroke="rgba(200,148,58,0.2)" stroke-width="1.5"/>
    </svg>
  </div>

  <!-- ── TOP STRIP ── -->
  <div class="top-strip">
    <div class="top-brand">
      <span class="brand-name">SEA LA VIE</span>
      <div class="brand-sep"></div>
      <span class="brand-sub" id="routeSubLabel">The Journey</span>
    </div>
    <div class="top-status" id="routeStatus">Preparing…</div>
  </div>

  <!-- ── MEDIA CARD ── -->
  <div class="media-card" id="mediaCard">
    <button class="media-close" id="mediaCloseBtn" aria-label="Close">×</button>
    <div class="media-frame" id="mediaFrame"></div>
    <div class="media-body">
      <div class="stop-eyebrow" id="stopEyebrow">Stop 1 of 5</div>
      <h2 class="media-title" id="mediaTitle">Loading…</h2>
      <p class="media-text" id="mediaText">Preparing route.</p>
      <div class="media-chips">
        <span class="chip" id="stopTagChip">Journey</span>
        <span class="chip" id="mediaTypeChip">—</span>
      </div>
    </div>
  </div>

  <!-- ── PEEK BUTTON ── -->
  <button class="media-peek" id="mediaPeekBtn" aria-label="Show stop info">
    <span class="peek-dot"></span>
    <span class="peek-label" id="mediaPeekLabel">Stop Info</span>
  </button>

  <!-- ── HINT ── -->
  <div class="hint-strip" id="hintStrip">
    <span class="hint-dot"></span>
    <span>Drag to explore the route</span>
    <span class="hint-dot"></span>
  </div>

  <!-- ── ROUTE CARD ── -->
  <div class="route-card">
    <div class="route-top">
      <div class="route-label">
        <strong id="routeFromTo">Manly → Tangalooma</strong>
        <span id="routeMeta">Private Charter · Moreton Bay</span>
      </div>
      <div class="route-label current-stop">
        <div class="stop-progress-label">Now at</div>
        <div id="currentStopName" style="font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:var(--cream);">—</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="stop-ticks" id="stopTicks"></div>
      <input id="progressSlider" type="range" min="0" max="1000" step="1" value="0" aria-label="Route progress"/>
    </div>
    <div class="stop-name-row">
      <span id="startLabel">Manly Harbour</span>
      <span id="midLabel"></span>
      <span id="endLabel">Tangalooma</span>
    </div>
  </div>

  <!-- ── LOADING ── -->
  <div class="loading-card" id="loadingCard">
    <p>Preparing your journey…</p>
    <small>Loading Moreton Bay chart</small>
  </div>
</div>

<script>
require([
  "esri/config",
  "esri/WebMap",
  "esri/views/MapView",
  "esri/Graphic",
  "esri/geometry/Point",
  "esri/geometry/Polyline"
], function(esriConfig, WebMap, MapView, Graphic, Point, Polyline) {

  esriConfig.portalUrl = "https://qgsp.maps.arcgis.com";

  const WEBMAP_ID = "5f8e05855b62491695d9ef0fc6671480";
  const TARGET_LAYER_ITEM_ID = "fa7a1c8a3684461d961dc55557a2ea38";

  // ── DOM refs
  const ui = {
    mediaCard:       document.getElementById("mediaCard"),
    mediaFrame:      document.getElementById("mediaFrame"),
    mediaTitle:      document.getElementById("mediaTitle"),
    mediaText:       document.getElementById("mediaText"),
    stopEyebrow:     document.getElementById("stopEyebrow"),
    stopTagChip:     document.getElementById("stopTagChip"),
    mediaTypeChip:   document.getElementById("mediaTypeChip"),
    mediaCloseBtn:   document.getElementById("mediaCloseBtn"),
    mediaPeekBtn:    document.getElementById("mediaPeekBtn"),
    mediaPeekLabel:  document.getElementById("mediaPeekLabel"),
    routeSubLabel:   document.getElementById("routeSubLabel"),
    routeFromTo:     document.getElementById("routeFromTo"),
    routeMeta:       document.getElementById("routeMeta"),
    routeStatus:     document.getElementById("routeStatus"),
    currentStopName: document.getElementById("currentStopName"),
    loadingCard:     document.getElementById("loadingCard"),
    progressSlider:  document.getElementById("progressSlider"),
    startLabel:      document.getElementById("startLabel"),
    midLabel:        document.getElementById("midLabel"),
    endLabel:        document.getElementById("endLabel"),
    stopTicks:       document.getElementById("stopTicks"),
    hintStrip:       document.getElementById("hintStrip"),
  };

  // ── Branded fallback stops for Sea La Vie
  const brandedStops = [
    {
      name: "Manly Boat Harbour",
      tag: "Departure",
      text: "Your escape begins at Queensland's largest boat harbour — just 45 minutes from Brisbane CBD. Step aboard Sea La Vie. From this moment, every notification, every obligation, every schedule simply ceases to exist.",
      longitude: 153.1751,
      latitude: -27.4673,
      media: [{
        type: "image",
        url: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Brisbane_CBD_from_Kangaroo_Point%2C_Queensland%2C_Australia%2C_2020%2C_01.jpg/1280px-Brisbane_CBD_from_Kangaroo_Point%2C_Queensland%2C_Australia%2C_2020%2C_01.jpg",
        title: "Brisbane Departure",
        caption: "The city you are leaving behind"
      }]
    },
    {
      name: "The Open Bay",
      tag: "Freedom",
      text: "Brisbane's skyline shrinks to a smudge on the horizon. Moreton Bay's 1,500 km² of Marine Park opens up around you. No schedule. No strangers on your deck. Just the sound of the hull cutting clean water.",
      longitude: 153.2280,
      latitude: -27.4050,
      media: [{
        type: "image",
        url: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Moreton_Bay.jpg/1280px-Moreton_Bay.jpg",
        title: "Open Moreton Bay",
        caption: "1,500 km² of protected marine park"
      }]
    },
    {
      name: "Dolphin Waters",
      tag: "Marine Life",
      text: "Moreton Bay is home to one of Australia's largest resident bottlenose dolphin populations. Out here they find the bow wave and stay — wild, effortless, unhurried. Jeremy's marine biology background means you'll understand exactly what you're witnessing.",
      longitude: 153.2850,
      latitude: -27.3100,
      media: [{
        type: "image",
        url: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Tursiops_truncatus_01.jpg/1280px-Tursiops_truncatus_01.jpg",
        title: "Bottlenose Dolphins",
        caption: "Wild resident bottlenose dolphins, Moreton Bay"
      }]
    },
    {
      name: "Peel Island — Teerk Roo Ra",
      tag: "Hidden Gem",
      text: "A national park so pristine that Jeremy keeps his favourite anchor spots private. Horseshoe Bay's crystal-clear shallows are perfect for a swim or snorkel — and the only other people you'll see are the ones you brought.",
      longitude: 153.3420,
      latitude: -27.2500,
      media: [{
        type: "image",
        url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Peel_Island_QLD_1.jpg/1280px-Peel_Island_QLD_1.jpg",
        title: "Peel Island",
        caption: "Teerk Roo Ra National Park — private anchorage"
      }]
    },
    {
      name: "The Tangalooma Wrecks",
      tag: "Signature Stop",
      text: "Fifteen ships deliberately scuttled between 1963 and 1984 now form Queensland's #1 snorkel site. Over 200 fish species. 130 coral species. Turtles, wobbegongs, rays — all making these rusted hulls home. Time stops completely underwater.",
      longitude: 153.3650,
      latitude: -27.1680,
      media: [{
        type: "image",
        url: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Tangalooma_Wrecks_aerial.JPG/1280px-Tangalooma_Wrecks_aerial.JPG",
        title: "The Tangalooma Wrecks",
        caption: "15 scuttled ships · Queensland's #1 snorkel site"
      }]
    }
  ];

  // ── State
  const state = {
    view: null,
    stops: [],
    fractions: [],
    progress: 0,
    currentStopIdx: 0,
    highlightGraphic: null,
    cycleTimer: null,
    collapseTimer: null,
    hintHidden: false,
    touch: { active: false, id: null, startX: 0, startProg: 0 }
  };

  // ── Map init
  const webmap = new WebMap({ portalItem: { id: WEBMAP_ID } });
  const view = new MapView({
    container: "viewDiv",
    map: webmap,
    center: [153.27, -27.32],
    zoom: 9,
    constraints: { snapToZoom: false, rotationEnabled: false },
    navigation: { momentumEnabled: false, browserTouchPanEnabled: false },
    ui: { components: [] }
  });
  state.view = view;

  // ── Events
  ui.progressSlider.addEventListener("input", e => setProgress(+e.target.value / 1000));
  ui.mediaCloseBtn.addEventListener("click", e => { e.stopPropagation(); collapseMedia(); });
  ui.mediaPeekBtn.addEventListener("click", e => { e.stopPropagation(); showMedia(false); });

  window.addEventListener("wheel", e => {
    if (Math.abs(e.deltaY) < Math.abs(e.deltaX)) return;
    e.preventDefault();
    setProgress(state.progress + e.deltaY * 0.00045);
    hideHint();
  }, { passive: false });

  const app = document.getElementById("app");
  app.addEventListener("touchstart", onTouchStart, { passive: false });
  app.addEventListener("touchmove",  onTouchMove,  { passive: false });
  app.addEventListener("touchend",   onTouchEnd,   { passive: false });
  app.addEventListener("touchcancel",onTouchEnd,   { passive: false });
  app.addEventListener("pointerdown", onPtrDown);
  app.addEventListener("pointermove", onPtrMove);
  app.addEventListener("pointerup",   onPtrEnd);
  app.addEventListener("pointercancel", onPtrEnd);
  window.addEventListener("resize", debounce(() => view && view.resize(), 120));

  // ── Load map
  view.when(async () => {
    try {
      await webmap.loadAll();
      const layer = await findPointLayer(webmap);
      if (!layer) throw new Error("No point layer");
      await layer.load();
      const stops = await loadStops(layer);
      if (!stops.length) throw new Error("No stops");
      applyStops(stops, layer.title || "Sea La Vie Charter Route", false);
    } catch (err) {
      console.warn("Using branded fallback:", err.message);
      applyStops(brandedStops, "Manly → Tangalooma Wrecks", true);
    }
  });

  // ── Layer finder
  async function findPointLayer(wm) {
    const all = [];
    const collect = lc => { if (!lc) return; lc.forEach(l => { all.push(l); if (l.layers) collect(l.layers); }); };
    collect(wm.layers);
    const features = all.filter(l => l && l.type === "feature");
    const exact = features.find(l => l.portalItem?.id === TARGET_LAYER_ITEM_ID && l.geometryType === "point");
    if (exact) return exact;
    const points = [];
    for (const l of features) {
      try { await l.load(); if (l.geometryType === "point") points.push(l); } catch(e) {}
    }
    return points.find(l => l.capabilities?.data?.supportsAttachment) || points[0] || null;
  }

  // ── Load stops from layer
  async function loadStops(layer) {
    const q = layer.createQuery();
    q.where = layer.definitionExpression || "1=1";
    q.returnGeometry = true;
    q.outFields = ["*"];
    q.orderByFields = guessOrderFields(layer.fields || []);
    const res = await layer.queryFeatures(q);
    let feats = (res.features || []).filter(f => f.geometry && isFinite(f.geometry.longitude ?? f.geometry.x));
    if (!feats.length) return [];
    if (!q.orderByFields?.length) feats = sortSpatially(feats);
    const oidField = layer.objectIdField || (layer.fields || []).find(f => f.type === "oid")?.name || "OBJECTID";
    const stops = [];
    for (let i = 0; i < feats.length; i++) {
      const f = feats[i]; const a = f.attributes || {};
      const oid = a[oidField];
      const name = pickVal(a, ["Name","NAME","Title","TITLE","Stop","STOP","Location","site_name","Caption"]) || `Stop ${i+1}`;
      const text = pickVal(a, ["Description","DESCRIPTION","Details","Narrative","Text","Notes","Summary","Caption"]) || `Charter stop on Moreton Bay.`;
      const tag  = pickVal(a, ["Tag","TYPE","Category","Type","tag","category"]) || "Stop";
      let media = [];
      if (oid != null && layer.capabilities?.data?.supportsAttachment) {
        try {
          const am = await layer.queryAttachments({ objectIds: [oid] });
          media = (am[oid] || []).map(att => attToMedia(att, layer.url, oid, name)).filter(Boolean);
        } catch(e) {}
      }
      stops.push({
        name, text, tag,
        longitude: f.geometry.longitude ?? f.geometry.x,
        latitude:  f.geometry.latitude  ?? f.geometry.y,
        media
      });
    }
    return stops;
  }

  function attToMedia(att, url, oid, title) {
    const raw = (att.name || att.filename || "").toLowerCase();
    const ct  = (att.contentType || "").toLowerCase();
    const isVid = ct.startsWith("video/") || /\.(mp4|webm|mov)$/i.test(raw);
    const isImg = ct.startsWith("image/") || /\.(png|jpg|jpeg|gif|webp)$/i.test(raw);
    if (!isVid && !isImg) return null;
    const u = att.url || (url && att.id != null ? `${url}/${oid}/attachments/${att.id}` : null);
    if (!u) return null;
    return { type: isVid ? "video" : "image", url: u, title: att.name || title, caption: att.contentType || "" };
  }

  // ── Apply stops
  function applyStops(stops, title, isFallback) {
    state.stops = stops;
    state.fractions = buildFractions(stops);
    state.progress = 0; state.currentStopIdx = 0;
    ui.progressSlider.value = "0";

    const first = stops[0], last = stops[stops.length - 1];
    ui.routeFromTo.textContent = `${first?.name || "Start"} → ${last?.name || "End"}`;
    ui.routeMeta.textContent = isFallback ? "Private Charter · Moreton Bay Marine Park" : "Sea La Vie Charter Route";
    ui.startLabel.textContent = first?.name || "Start";
    ui.endLabel.textContent   = last?.name  || "End";
    ui.midLabel.textContent   = stops.length > 2 ? `${stops.length - 2} stop${stops.length - 2 === 1 ? "" : "s"}` : "";

    renderTicks();
    drawGraphics();
    fitView();
    renderProgress(true);
    ui.loadingCard.style.display = "none";
  }

  // ── Draw route graphics
  function drawGraphics() {
    const g = state.view.graphics; g.removeAll();
    if (state.stops.length >= 2) {
      g.add(new Graphic({
        geometry: new Polyline({ paths: [state.stops.map(s => [s.longitude, s.latitude])], spatialReference: { wkid: 4326 } }),
        symbol: { type: "simple-line", color: [200, 148, 58, 0.65], width: 2.5, style: "short-dot" }
      }));
    }
    state.stops.forEach((s, i) => {
      const isKey = i === 0 || i === state.stops.length - 1;
      g.add(new Graphic({
        geometry: new Point({ longitude: s.longitude, latitude: s.latitude, spatialReference: { wkid: 4326 } }),
        symbol: { type: "simple-marker", style: "circle",
          size: isKey ? 10 : 7,
          color: isKey ? [200, 148, 58, 0.9] : [200, 148, 58, 0.5],
          outline: { color: [240, 232, 213, 0.75], width: 1.5 }
        }
      }));
    });
    state.highlightGraphic = new Graphic({
      geometry: new Point({ longitude: state.stops[0].longitude, latitude: state.stops[0].latitude, spatialReference: { wkid: 4326 } }),
      symbol: { type: "simple-marker", style: "circle", size: 20,
        color: [200, 148, 58, 0],
        outline: { color: [200, 148, 58, 0.75], width: 2 }
      }
    });
    g.add(state.highlightGraphic);
  }

  function fitView() {
    const xs = state.stops.map(s => s.longitude), ys = state.stops.map(s => s.latitude);
    state.view.goTo({
      target: { xmin: Math.min(...xs), ymin: Math.min(...ys), xmax: Math.max(...xs), ymax: Math.max(...ys), spatialReference: { wkid: 4326 } },
      padding: { left: 50, right: 50, top: 90, bottom: 160 }
    }, { animate: false }).catch(() => {});
  }

  // ── Progress
  function setProgress(v) {
    state.progress = clamp(v, 0, 1);
    ui.progressSlider.value = String(Math.round(state.progress * 1000));
    renderProgress();
    hideHint();
  }

  function renderProgress(initial = false) {
    if (!state.stops.length) return;
    const pt  = interpolate(state.stops, state.fractions, state.progress);
    const idx = stopIdxFromProgress(state.fractions, state.progress);
    state.currentStopIdx = idx;
    const stop = state.stops[idx];
    const next = state.stops[Math.min(idx + 1, state.stops.length - 1)];

    ui.currentStopName.textContent = stop?.name || "—";
    ui.routeStatus.textContent = `${Math.round(state.progress * 100)}% · ${next && next !== stop ? next.name : "Destination reached"}`;

    if (pt && state.view) {
      state.view.center = [pt.longitude, pt.latitude];
      if (state.highlightGraphic) {
        state.highlightGraphic.geometry = new Point({ longitude: pt.longitude, latitude: pt.latitude, spatialReference: { wkid: 4326 } });
      }
    }
    updateMedia(idx, initial);
  }

  // ── Media
  function updateMedia(idx, initial) {
    const stop = state.stops[idx];
    if (!stop) return;
    const items = stop.media?.length ? stop.media : [];

    ui.stopEyebrow.textContent = `Stop ${idx + 1} of ${state.stops.length}`;
    ui.mediaTitle.textContent  = stop.name;
    ui.mediaText.textContent   = stop.text;
    ui.stopTagChip.textContent = stop.tag || "Charter";
    ui.mediaPeekLabel.textContent = stop.name;

    clearTimers();

    if (!items.length) {
      ui.mediaCard.classList.remove("show");
      ui.mediaPeekBtn.classList.remove("show");
      ui.mediaTypeChip.textContent = "No media";
      ui.mediaFrame.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:rgba(200,148,58,0.4);">Sea La Vie</div>`;
      return;
    }

    let mi = 0;
    const render = () => {
      const item = items[mi];
      ui.mediaTypeChip.textContent = item.type;
      const badge = `<div class="media-badge">${item.type === "video" ? "▶ VIDEO" : "PHOTO"}</div>`;
      if (item.type === "video") {
        ui.mediaFrame.innerHTML = `${badge}<video src="${encodeURI(item.url)}" autoplay muted loop playsinline></video>`;
      } else {
        ui.mediaFrame.innerHTML = `${badge}<img src="${encodeURI(item.url)}" alt="${esc(item.title || stop.name)}" loading="eager" onerror="this.style.opacity='0.2'"/>`;
      }
    };

    render();
    showMedia(!initial);
    if (items.length > 1) {
      state.cycleTimer = setInterval(() => { mi = (mi + 1) % items.length; render(); }, 4500);
    }
  }

  function showMedia(autoCollapse) {
    ui.mediaPeekBtn.classList.remove("show");
    ui.mediaCard.classList.add("show");
    if (autoCollapse) {
      state.collapseTimer = setTimeout(collapseMedia, 3000);
    }
  }

  function collapseMedia() {
    ui.mediaCard.classList.remove("show");
    if (ui.mediaPeekLabel.textContent) ui.mediaPeekBtn.classList.add("show");
  }

  function clearTimers() {
    if (state.cycleTimer) { clearInterval(state.cycleTimer); state.cycleTimer = null; }
    if (state.collapseTimer) { clearTimeout(state.collapseTimer); state.collapseTimer = null; }
  }

  function hideHint() {
    if (!state.hintHidden) {
      ui.hintStrip.classList.add("hidden");
      state.hintHidden = true;
    }
  }

  // ── Ticks
  function renderTicks() {
    ui.stopTicks.innerHTML = "";
    state.fractions.forEach((f, i) => {
      const t = document.createElement("div");
      t.className = "stop-tick";
      t.style.left = `${f * 100}%`;
      t.title = state.stops[i]?.name || `Stop ${i+1}`;
      ui.stopTicks.appendChild(t);
    });
  }

  // ── Touch / pointer
  function onTouchStart(e) {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    state.touch = { active: true, id: t.identifier, startX: t.clientX, startProg: state.progress };
  }
  function onTouchMove(e) {
    if (!state.touch.active) return;
    const t = [...e.touches].find(x => x.identifier === state.touch.id);
    if (!t) return;
    e.preventDefault();
    setProgress(state.touch.startProg + (t.clientX - state.touch.startX) / Math.max(window.innerWidth, 320) * 1.15);
  }
  function onTouchEnd(e) {
    if (!state.touch.active) return;
    if ([...e.touches].some(x => x.identifier === state.touch.id)) return;
    state.touch.active = false;
  }
  function onPtrDown(e) {
    if (e.pointerType !== "mouse") return;
    if (e.target?.tagName === "INPUT" || e.target?.closest("video")) return;
    state.touch = { active: true, id: "mouse", startX: e.clientX, startProg: state.progress };
  }
  function onPtrMove(e) {
    if (!state.touch.active || state.touch.id !== "mouse") return;
    if (e.buttons === 0) return onPtrEnd();
    setProgress(state.touch.startProg + (e.clientX - state.touch.startX) / Math.max(window.innerWidth, 320) * 1.15);
  }
  function onPtrEnd() { if (state.touch.id === "mouse") { state.touch.active = false; state.touch.id = null; } }

  // ── Helpers
  function guessOrderFields(fields) {
    const ns = fields.map(f => f.name);
    return ["Order","Sequence","Seq","StopOrder","Sort"].map(n => ns.includes(n) ? `${n} ASC` : null).filter(Boolean).slice(0,1) || null;
  }
  function pickVal(attrs, keys) {
    for (const k of keys) { const v = attrs[k]; if (v !== null && v !== undefined && String(v).trim()) return String(v).trim(); }
    return null;
  }
  function sortSpatially(feats) {
    const rem = feats.slice().sort((a,b) => (a.geometry.longitude??a.geometry.x) - (b.geometry.longitude??b.geometry.x));
    const route = [rem.shift()];
    while (rem.length) {
      const last = route[route.length-1];
      let bi = 0, bd = Infinity;
      rem.forEach((c,i) => { const d = Math.hypot((c.geometry.longitude??c.geometry.x)-(last.geometry.longitude??last.geometry.x),(c.geometry.latitude??c.geometry.y)-(last.geometry.latitude??last.geometry.y)); if(d<bd){bd=d;bi=i;} });
      route.push(rem.splice(bi,1)[0]);
    }
    return route;
  }
  function buildFractions(stops) {
    if (!stops.length) return [];
    if (stops.length === 1) return [0];
    const cum = [0]; let total = 0;
    for (let i=1;i<stops.length;i++) {
      const dx = stops[i].longitude-stops[i-1].longitude, dy = stops[i].latitude-stops[i-1].latitude;
      total += Math.hypot(dx,dy); cum.push(total);
    }
    return total ? cum.map(d=>d/total) : cum.map(()=>0);
  }
  function interpolate(stops, fracs, p) {
    if (!stops.length) return null;
    if (stops.length===1||p<=0) return {longitude:stops[0].longitude,latitude:stops[0].latitude};
    if (p>=1) return {longitude:stops[stops.length-1].longitude,latitude:stops[stops.length-1].latitude};
    for (let i=1;i<fracs.length;i++) {
      if (p<=fracs[i]) {
        const t = fracs[i]===fracs[i-1] ? 0 : (p-fracs[i-1])/(fracs[i]-fracs[i-1]);
        return { longitude: lerp(stops[i-1].longitude,stops[i].longitude,t), latitude: lerp(stops[i-1].latitude,stops[i].latitude,t) };
      }
    }
    return {longitude:stops[stops.length-1].longitude,latitude:stops[stops.length-1].latitude};
  }
  function stopIdxFromProgress(fracs, p) {
    for (let i=fracs.length-1;i>=0;i--) if(p>=fracs[i]) return i;
    return 0;
  }
  function lerp(a,b,t) { return a+(b-a)*t; }
  function clamp(v,mn,mx) { return Math.max(mn,Math.min(mx,v)); }
  function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function debounce(fn,ms) { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

}); // end require
</script>
</body>
